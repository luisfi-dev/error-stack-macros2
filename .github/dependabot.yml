version: 2

updates:
  # Production dependencies (e.g., [dependencies], [build-dependencies])
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: daily
    allow:
      - dependency-type: "production"
    labels:
      - "📦 Dependencies"
    assignees:
      - luisfi-dev

  # Development dependencies (e.g., [dev-dependencies])
  - package-ecosystem: "cargo"
    directory: "impl"
    schedule:
      interval: daily
    allow:
      - dependency-type: "development"
    labels:
      - "💻 Dev Dependencies"
    assignees:
      - luisfi-dev
