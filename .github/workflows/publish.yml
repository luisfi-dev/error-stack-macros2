name: Publish to crates.io

on:
  push:
    branches:
      - stable

permissions:
  contents: write
  discussions: write

jobs:
  test:
    name: Run tests and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
        with:
          components: rustfmt, clippy

      - name: Run RustFMT
        uses: actions-rust-lang/rustfmt@4066006ec54a31931b9b1fddfd38f2fdf2d27143

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features

      - name: Run tests
        run: cargo test --verbose --all-targets --all-features

      - name: Run documentation tests
        run: cargo test --verbose --doc --all-features

      - name: Get crate version
        id: get_crate_info
        run: |
          CRATE_VERSION=$(grep '^version = ' impl/Cargo.toml | head -n 1 | cut -d '"' -f 2)
          echo "Crate error-stack-macros2"
          echo "Crate Version: $CRATE_VERSION"
          echo "crate_version=$CRATE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATESIO_API_TOKEN }}
        run: cargo publish

      - name: Create GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          body_path: RELEASE.md
          prerelease: true
          name: |
            `error-stack-macros2` ${{ steps.get_crate_info.outputs.crate_version }}
          tag_name: v${{ steps.get_crate_info.outputs.crate_version }}
          target_commitish: stable
